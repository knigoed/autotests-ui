name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run tests with pytest + Allure
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2

      # ⬇️ Забираем старую историю (если есть)
      - name: Get Allure history
        uses: actions/checkout@v3
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # ⬇️ Генерация отчёта
      - name: Generate Allure report
        uses: andgineer/allure-report@v3
        if: always()
        with:
          allure_results: allure-results
          allure_history: gh-pages

      # ⬇️ Дебаг (очень полезно оставить)
      - name: Debug files
        if: always()
        run: |
          echo "ROOT:"
          ls -la
          echo "ALLURE-REPORT:"
          ls -la allure-report || echo "no allure-report"
          echo "ALLURE-HISTORY:"
          ls -la allure-history || echo "no allure-history"

      # ⬇️ Публикация в gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report