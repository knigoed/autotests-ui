name: UI tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run tests (Allure results)
        run: |
          pytest -m regression --alluredir=allure-results

      - name: Restore Coverage history
        uses: actions/cache/restore@v5
        with:
          path: coverage-history.json
          key: coverage-history-${{ github.run_id }}
          restore-keys: |
            coverage-history-    

      - name: Generate Coverage report
        run: |
          ui-coverage-tool save-report

      - name: Cache Coverage  history
        if: always()
        uses: actions/cache/save@v5
        with:
            path: coverage-history.json
            key: coverage-history-${{ github.run_id }}

      - name: Upload Coverage results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

      - name: Upload Allure results
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: allure-results


  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Load previous report history
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history
        run: |
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Allure
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report